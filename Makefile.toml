[config]
default_to_workspace = false
# Skip loading of all core tasks which saves up a bit on toml parsing and task creation
skip_core_tasks = true
# Skips loading Git related environment variables
skip_git_env_info = true
# Skips loading rust related environment variables
skip_rust_env_info = true
# Skips loading the current crate related environment variables
skip_crate_env_info = true

# Format the workspace with nightly rustfmt (see rustfmt.toml; unstable import options).
[tasks.fmt]
dependencies = ["fmt-dx", "fmt-cargo"]

[tasks.fmt-dx]
command = "dx"
args = ["fmt"]

[tasks.fmt-cargo]
command = "rustup"
args = ["run", "nightly", "cargo", "fmt", "--all"]

[tasks.sqlx-offline]
command = "cargo"
args = ["sqlx", "prepare", "--workspace"]

[tasks.upgrade]
dependencies = ["upgrade-internal", "update"]

[tasks.upgrade-internal]
command = "cargo"
args = ["upgrade", "-i", "-v"]

[tasks.update]
command = "cargo"
args = ["update"]

[tasks.start-web]
cwd = "/workspace/crates/is_this_a_smurf"
run_task = { name = ["start-web-tailwind", "start-web-dx"], parallel = true }

[tasks.start-web-dx]
cwd = "/workspace/crates/is_this_a_smurf"
command = "dx"
args = ["serve"]

[tasks.start-web-tailwind]
cwd = "/workspace/crates/is_this_a_smurf"
command = "npx"
args = [
    "@tailwindcss/cli",
    "-i",
    "./input.css",
    "-o",
    "./assets/tailwind.css",
    "--watch",
]

# Build the web app for production (tailwind first, then dx release build → dist/).
[tasks.build-web]
cwd = "/workspace/crates/is_this_a_smurf"
run_task = { name = ["build-web-tailwind", "build-web-dx"], parallel = false }

[tasks.build-web-tailwind]
cwd = "/workspace/crates/is_this_a_smurf"
command = "npx"
args = [
    "--yes",
    "@tailwindcss/cli",
    "-i",
    "./input.css",
    "-o",
    "./assets/tailwind.css",
    "--minify",
]

[tasks.build-web-dx]
cwd = "/workspace/crates/is_this_a_smurf"
command = "dx"
args = ["build", "--platform", "web", "--release"]

# Restore PostgreSQL from the custom-format dump shipped in the devcontainer image (or data/database_dump.dump on the bind mount).
[tasks.restore-database]
cwd = "/workspace"
command = "bash"
args = ["scripts/restore-database.sh"]

# Write data/database_dump.dump from a live database (pg_dump -Fc; rebuild the devcontainer image to bake a new snapshot).
[tasks.database-dump]
cwd = "/workspace"
command = "bash"
args = ["scripts/database-dump.sh"]
